<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeShield</title>

    <!-- ПОДКЛЮЧЕНИЕ CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">Fake<span>Shield</span></div>
    </div>
</header>

<section class="hero">
    <h1>Жалған ақпараттан қорған!</h1>
    <p>Фейктерді анықтайтын интеллектуалды жүйе</p>
</section>

<section class="check">
    <div class="container">
        <h2>Ақпаратты тексеру</h2>

        <textarea id="userInput" placeholder="Мәтінді енгіз..."></textarea>

        <br>
        <button class="btn-primary" onclick="checkFake()">Талдау жасау</button>

        <!-- AI ОБУЧЕНИЕ -->
        <br><br>
        <button onclick="trainCurrent('fake')">❌ Бұл фейк</button>
        <button onclick="trainCurrent('real')">✅ Бұл дұрыс</button>

        <div id="resultBlock" class="result-card" style="display:none;">
            <p id="resultText"></p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 FakeShield</p>
</footer>

<!-- ПОДКЛЮЧЕНИЕ JS -->
<script src="script.js"></script>

</body>
</html>
